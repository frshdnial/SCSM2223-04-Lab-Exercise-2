<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Task Manager</h1>

    <div>
      Tasks: <span id="task-count">0</span>
    </div>

    <label for="filter">Filter:</label>
    <select id="filter">
      <option value="all">All</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
  </header>

  <main class="board">

    <section id="todo" class="column">
      <h2>To Do</h2>
      <ul class="task-list"></ul>
      <button class="add-task-btn">+ Add Task</button>
    </section>

    <section id="inprogress" class="column">
      <h2>In Progress</h2>
      <ul class="task-list"></ul>
      <button class="add-task-btn">+ Add Task</button>
    </section>

    <section id="done" class="column">
      <h2>Done</h2>
      <ul class="task-list"></ul>
      <button class="add-task-btn">+ Add Task</button>
      <button id="clear-done">Clear All</button>
    </section>

  </main>

  <div id="task-modal" class="modal hidden">

    <div class="modal-content">
      <h2>Add New Task</h2>

      <label>Title:</label>
      <input type="text" id="task-title" placeholder="Enter task title">

      <label>Description:</label>
      <textarea id="task-desc" placeholder="Enter task description"></textarea>

      <label>Priority:</label>
      <select id="task-priority">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <label>Due Date:</label>
      <input type="date" id="task-date">

      <div class="modal-actions">
        <button id="save-task">Save</button>
        <button id="cancel-task">Cancel</button>
      </div>

    </div>

  </div>

  <script src="taskmanager.js"></script>
  
</body>
</html>
